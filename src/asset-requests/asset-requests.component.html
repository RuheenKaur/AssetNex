
<div class="page-wrapper">

  <div class="track-header-actions">
      <button class="btn-refresh" (click)="loadTickets()" title="Refresh">
        <i class="pi pi-refresh"></i>
      </button>
      <button class="btn-back" (click)="goBack()">
        <i class="pi pi-arrow-left"></i> Dashboard
      </button>
    </div>
  <div class="request-container">

    <div class="form-header">
      <h2>Raise an Asset Request</h2>
      <p>Fill in the details below to submit your request</p>
    </div>

    <form [formGroup]="requestForm" (ngSubmit)="submitForm()">

      <div class="section-label">Your Information</div>

      <div class="form-row two-col">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" formControlName="name" readonly />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" readonly/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Contact</label>
          <input type="text" formControlName="contact" readonly />
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-label">Request Details</div>

      <div class="form-row">
        <div class="form-group">
          <label>Asset Type Required</label>
          <select formControlName="requestedAssetType">
            <option value="">-- Select Asset Type --</option>
            <option>Laptop</option>
            <option>Monitor</option>
            <option>Mouse</option>
            <option>Keyboard</option>
            <option>Headset</option>
            <option>Charger</option>
            <option>HDMI Cable</option>
            <option>Pen Drive</option>
            <option>Hard Disk</option>
            <option>Memory Card Reader</option>
            <option>Smart Phone</option>
            <option>Tablet</option>
            <option>Other</option>
          </select>
        </div>
      </div>
     <div class="form-row">
        <div class="form-group">
          <label>Reason for Request</label>
          <textarea
            formControlName="reason"
            placeholder="Why do you need this asset?"
            rows="4">
          </textarea>
        </div>
      </div>


      <div *ngIf="success" class="success-message">
        <i class="pi pi-check-circle"></i>
        Asset request submitted successfully!
      </div>


      <div class="button-row">
        <button type="button" class="btn-back" (click)="goToUserDashboard()">
          ← Back
        </button>


<button
  type="submit"
  class="btn-submit"
  [disabled]="requestForm.invalid || loading">

  {{ loading ? 'Submitting...' : 'Submit Request' }}

</button>
      </div>

    </form>
  </div>
</div>
