<!-- User Sidebar Component HTML -->
<div class="content-wrapper">
  <!-- Top Welcome Banner -->
  <div class="welcome">USER'S ASSETS</div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- User Greeting -->
    <h6 class="user-greeting">Hello, {{ userName }}! 👋</h6>

    <!-- Navigation Menu -->
    <ul class="sidebar-nav">
      <!-- My Assets -->
      <li>
        <a class="nav-item" (click)="goToAssetAssign()">
          <i class="pi pi-desktop"></i>
          <span>My Assets</span>
        </a>
      </li>

      <!-- Asset Request with NEW badge -->
      <li>
        <a class="nav-item" (click)="goToAssetRequest()">
          <i class="pi pi-send"></i>
          <span>Asset Request</span>
          <span class="badge">NEW</span>
        </a>
      </li>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Support Section Header -->
      <li class="section-title">
        <i class="pi pi-headphones"></i>
        <span>Support</span>
      </li>

      <!-- Raise Ticket -->
      <li>
        <a class="nav-item" (click)="goToSupporttickets()">
          <i class="pi pi-plus-circle"></i>
          <span>Raise Ticket</span>
        </a>
      </li>

      <!-- Track Tickets -->
      <li>
        <a class="nav-item" (click)="goToTracktickets()">
          <i class="pi pi-list-check"></i>
          <span>Track Tickets</span>
        </a>
      </li>

      <!-- Divider -->
      <div class="divider"></div>

      <!-- Settings -->
      <li>
        <a class="nav-item">
          <i class="pi pi-cog"></i>
          <span>Settings</span>
        </a>
      </li>

      <!-- Logout -->
      <li>
        <a class="nav-item logout" (click)="onLogOut()">
          <i class="pi pi-sign-out"></i>
          <span>Logout</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main Content Area -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
</div>
