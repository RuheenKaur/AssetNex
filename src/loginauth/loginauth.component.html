<div class="login-page-wrapper">

  <!-- LEFT SIDE TEXT -->
  <div class="text-section">
    <p class="text">
      Manage your
      <span class="main">IT Assets</span>
      smarter.
    </p>
    <p>Track, assign, and dispose of IT assets across your organization — all in one place.</p>
  </div>

  <!-- RIGHT SIDE LOGIN CARD -->
  <div class="login-container">
    <div class="logo-wrapper">
      <h2 class="logo">AssetNex<span class="highlight">IT</span></h2>
      <p class="below">TRACK | MANAGE | DISPOSE</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="label">
        <input
          formControlName="email"
          class="form-control"
          type="email"
          placeholder="Email address"
          autocomplete="email"
        />

        <input
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Password"
          autocomplete="current-password"
        />

        <button type="submit" [disabled]="loading">
          {{ loading ? 'Logging in...' : 'Sign In' }}
        </button>

        <div *ngIf="error" class="text-danger">
          {{ error }}
        </div>
      </div>
    </form>

    <a class="forgot-link">Forgot your password?</a>
  </div>

</div>
