name: Build Angular

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Angular
        run: npm run build -- --configuration production

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: ./dist/newassetnext/browser/
          retention-days: 1
