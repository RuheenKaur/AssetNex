name: Build Angular

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./NewAssetNexIT/NewAssetNexIT
        run: npm install

      - name: Build Angular
        working-directory: ./NewAssetNexIT/NewAssetNexIT
        run: npm run build -- --configuration production

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: ./NewAssetNexIT/NewAssetNexIT/dist/newassetnext/browser/
          retention-days: 1

Install    → ./NewAssetNexIT/NewAssetNexIT
Build      → ./NewAssetNexIT/NewAssetNexIT
Artifact   → ./NewAssetNexIT/NewAssetNexIT/dist/newassetnext/browser/
